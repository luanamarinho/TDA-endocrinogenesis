# ============================================================
# Seqerakit — Giotto-TDA Endocrinogenesis Pipeline
# Workspace: LUANALAB/TDA-Project
# ============================================================

pipelines:
  - name: 'giotto-tda-endocrinogenesis'
    url: 'https://github.com/luanamarinho/TDA-endocrinogenesis'
    workspace: 'LUANALAB/TDA-Project'
    revision: 'main'
    description: 'scRNA-seq QC, normalization, HVG selection and UMAP on the scVelo pancreas dataset'
    compute-env: 'tda-azure'
    work-dir: 'az://tda/work'
    profile: 'azure'
    on_exists: 'ignore'

launch:
  - name: '${PIPELINE_RUN_NAME}'
    workspace: 'LUANALAB/TDA-Project'
    pipeline: 'giotto-tda-endocrinogenesis'
    compute-env: 'tda-azure'
    work-dir: 'az://tda/work'
    revision: 'main'
    profile: 'azure'
    params:
      # QC thresholds
      min_genes: 1200
      min_cells: 20
      max_mt_perc: 20.0
      # Normalization
      exclude_highly_expressed: true
      max_fraction: 0.05
      # HVG selection
      n_top_genes: 4000
      flavor: 'cell_ranger'
      # Dimensionality reduction
      umap_metric: 'euclidean'
      umap_random_state: 42
      n_components: 40
      # Output
      outdir: 'az://tda/results'
